name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pester:
    runs-on: windows-latest
    strategy:
      matrix:
        pwsh-version:
          - 7.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester 5
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0

      - name: Run Pester tests
        shell: pwsh
        run: pwsh scripts/run-tests.ps1 -CoverageThreshold 75

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results-${{ matrix.pwsh-version }}
          path: artifacts/test-results
          if-no-files-found: error
