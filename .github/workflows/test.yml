name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Gitleaks Incremental Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.0"
          curl -fsSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run secret scan since recorded baseline
        shell: pwsh
        run: pwsh -NoProfile -File scripts/gitleaks-history.ps1

  public-surface:
    name: Public Surface Audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Bootstrap repo hooks
        shell: pwsh
        run: pwsh -NoProfile -File scripts/bootstrap-git-guard.ps1

      - name: Assert hooks path
        shell: pwsh
        run: |
          $hooksPath = (git config --get core.hooksPath).Trim()
          if ($hooksPath -notmatch '(^|[\\/])\.githooks$') {
            throw "core.hooksPath must point to .githooks, got '$hooksPath'"
          }

      - name: Run git-guard
        shell: pwsh
        run: pwsh -NoProfile -File scripts/git-guard.ps1 -Mode full

      - name: Run public surface audit
        shell: pwsh
        run: pwsh -NoProfile -File scripts/audit-public-surface.ps1

  pester:
    name: Pester Tests (${{ matrix.name }})
    runs-on: windows-latest
    needs: public-surface
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bridge-foundation
            result: bridge-foundation
            timeout_minutes: 15
            paths: tests/winsmux-bridge.Tests.ps1
            full_name: "*Assert-Role*;*reviewer.sh prompt contract*;*Get-BridgeSettings*;*Get-OrchestraLayoutSettings*;*Vault helpers*;*team-pipeline helpers*;*manifest worker isolation metadata*;*winsmux pane env contract*;*pane-control helpers*;*logger helpers*"
          - name: bridge-agent-orchestra
            result: bridge-agent-orchestra
            timeout_minutes: 20
            paths: tests/winsmux-bridge.Tests.ps1
            full_name: "*agent-monitor helpers*;*agent-watchdog helpers*;*server-watchdog helpers*;*orchestra-preflight health contract*;*orchestra-start watchdog contract*;*orchestra-start server bootstrap*;*orchestra-start session reuse contract*;*orchestra-start rollback helpers*;*doctor bridge config metadata check*;*worker isolation diagnostics*;*pane scaler helpers*;*pane status helpers*;*orchestra layout script*"
          - name: bridge-command-status
            result: bridge-command-status
            timeout_minutes: 12
            paths: tests/winsmux-bridge.Tests.ps1
            full_name: "*winsmux status command*"
          - name: bridge-worker-workspace-sandbox
            result: bridge-worker-workspace-sandbox
            timeout_minutes: 12
            paths: tests/winsmux-bridge.Tests.ps1
            full_name: "*documents and routes the workers lifecycle command*;*prepares and cleans up a disposable isolated workspace*;*requires the isolated-enterprise execution profile*;*rejects unsafe isolated workspace projection paths*;*rejects reparse points in isolated workspace projections*;*cleans isolated workspace run directories*;*defines a Windows sandbox baseline*;*fails closed for Windows sandbox baselines*;*rejects worker-created reparse points before writing the Windows sandbox baseline manifest*"
          - name: bridge-worker-broker-token
            result: bridge-worker-broker-token
            timeout_minutes: 12
            paths: tests/winsmux-bridge.Tests.ps1
            full_name: "*defines a brokered execution baseline*;*issues, checks, refreshes, and expires broker run tokens*;*fails closed for broker baselines*"
          - name: bridge-worker-policy
            result: bridge-worker-policy
            timeout_minutes: 12
            paths: tests/winsmux-bridge.Tests.ps1
            full_name: "*defines enterprise execution policy*;*fails closed for enterprise execution policy*"
          - name: bridge-worker-secrets-status
            result: bridge-worker-secrets-status
            timeout_minutes: 12
            paths: tests/winsmux-bridge.Tests.ps1
            full_name: "*projects typed secrets for local Windows runs*;*projects typed secrets for isolated workspace runs*;*includes execution profile workspace and secret projection state*;*rejects unsafe or unresolved secret projections*"
          - name: bridge-worker-heartbeat-start
            result: bridge-worker-heartbeat-start
            timeout_minutes: 12
            paths: tests/winsmux-bridge.Tests.ps1
            full_name: "*marks and checks local worker heartbeats*;*keeps child run waiting separate*;*marks isolated worker heartbeats*;*includes worker heartbeat health*;*does not let stale worker heartbeat*;*does not let orphan heartbeat artifacts*;*expires self-reported stalled heartbeats*;*returns offline heartbeat status*;*rejects unsupported latest heartbeat profile*;*rejects heartbeat mark profile mismatches*;*honors latest heartbeat check thresholds*;*reports the default six worker slots*;*reports api_llm worker status*;*adds api_llm diagnostics*;*reports antigravity worker status*;*adds antigravity diagnostics*;*fails api_llm diagnostics*;*stops one worker by slot alias*;*blocks start for a degraded Colab worker*;*blocks start for an api_llm worker*;*blocks start for an antigravity worker*;*blocks start when the manifest approval*;*clears stale heartbeat binding*;*keeps a ready deferred worker idempotent*;*attaches a degraded Colab worker*;*prints worker doctor checks*"
          - name: bridge-worker-api-agy-exec
            result: bridge-worker-api-agy-exec
            timeout_minutes: 12
            paths: tests/winsmux-bridge.Tests.ps1
            full_name: "*records blocked api_llm exec artifacts*;*rejects OpenRouter endpoint overrides*;*rejects unsupported and unsafe api_llm runtime metadata*;*marks empty provider completions as malformed*;*redacts provider request ids*;*runs api_llm exec through OpenAI-compatible chat completions*;*uses the legacy OpenRouter env*;*accepts task-json as the api_llm exec input contract*;*rejects ambiguous api_llm script*;*rejects secret-like api_llm prompt input*;*records blocked antigravity exec artifacts*;*runs antigravity exec through agy print mode*;*marks antigravity exec with empty stdout*;*accepts task-json as the antigravity exec input contract*;*rejects ambiguous antigravity script*;*rejects secret-like antigravity prompt input*"
          - name: bridge-worker-colab-transfer
            result: bridge-worker-colab-transfer
            timeout_minutes: 12
            paths: tests/winsmux-bridge.Tests.ps1
            full_name: "*runs a one-shot Colab worker script*;*passes top-level task-json to the Colab adapter*;*lets the Colab adapter handle authentication*;*rejects prohibited Colab task input*;*classifies JSON-formatted Colab secret task fields*;*rejects WINSMUX_TASK_JSON Colab task input*;*redacts secrets and Drive paths from stored Colab logs*;*uploads only allowed files*;*keeps unstaged file upload locations typed*;*keeps empty stored worker logs local*;*ignores transfer artifacts when selecting the latest stored worker log*;*propagates stored failed run status*;*rejects unsafe run ids*;*rejects reparse points in worker transfer paths*;*excludes build outputs and oversized files*;*rejects directory uploads without an allowlisted directory*;*downloads a remote artifact*;*treats a new explicit download output as a file path*;*rejects explicit download outputs under the winsmux runtime directory*;*returns failing process exit codes when the Colab adapter fails*"
          - name: bridge-command-queue-reporting
            result: bridge-command-queue-reporting
            timeout_minutes: 12
            paths: tests/winsmux-bridge.Tests.ps1
            full_name: "*winsmux board command*;*winsmux inbox command*;*winsmux runs command*;*winsmux digest command*"
          - name: bridge-command-review-dispatch
            result: bridge-command-review-dispatch
            timeout_minutes: 12
            paths: tests/winsmux-bridge.Tests.ps1
            full_name: "*winsmux review-pack command*;*winsmux dispatch-task routing*;*winsmux explain command*"
          - name: bridge-provider-commands
            result: bridge-provider-commands
            timeout_minutes: 15
            paths: tests/winsmux-bridge.Tests.ps1
            full_name: "*winsmux send dispatch payload*;*winsmux task-run command*;*winsmux profile command*;*winsmux public first-run commands*;*winsmux conflict-preflight command*;*conflict preflight helper*;*public first-run helper*;*winsmux readiness adapter helpers*;*winsmux provider-capabilities command*;*winsmux meta-plan command*;*winsmux guard command*;*winsmux skills command*;*winsmux assign command*;*winsmux launcher command*;*winsmux role command provider routing*;*winsmux provider-switch command*;*winsmux orchestra-smoke command*"
          - name: bridge-artifacts-runtime
            result: bridge-artifacts-runtime
            timeout_minutes: 15
            paths: tests/winsmux-bridge.Tests.ps1
            full_name: "*operator startup restore contract docs*;*orchestra pane bootstrap plan*;*TASK-278 golden corpus fixtures*;*winsmux compare-runs and promote-tactic commands*;*winsmux observation and consultation artifacts*;*winsmux consultation commands*;*winsmux poll-events command*;*operator-poll helpers*;*winsmux control-rpc command*;*winsmux raw namespace forwarding*;*winsmux terminal backend switch*;*deferred worker startup*;*winsmux send fallback*;*watermark helpers*"
          - name: integration
            result: integration
            timeout_minutes: 25
            paths: tests/Integration.GateEnforcement.Tests.ps1;tests/Integration.MultiAgent.Tests.ps1;tests/Integration.PaneMonitorHook.Tests.ps1;tests/Integration.PluginHookLoader.Tests.ps1;tests/Integration.WorktreeHook.Tests.ps1
            full_name: ""
          - name: worker-benchmark
            result: worker-benchmark
            timeout_minutes: 20
            paths: tests/CliBakeoff.Tests.ps1;tests/HarnessContract.Tests.ps1;tests/ColabAcceptance.Tests.ps1;tests/ColabWorkerTemplates.Tests.ps1;tests/Runtime.VaultInject.Tests.ps1
            full_name: ""
          - name: release-public
            result: release-public
            timeout_minutes: 20
            paths: tests/PublicSurfacePolicy.Tests.ps1;tests/VersionSurface.Tests.ps1;tests/NpmReleasePackage.Tests.ps1;tests/GitHubWritePreflight.Tests.ps1;tests/McpServerContract.Tests.ps1;tests/ThreatModelContract.Tests.ps1;tests/EnterpriseStrategyAlignment.Tests.ps1;tests/ReviewLatencyHardening.Tests.ps1;tests/UpstreamReevaluation.Tests.ps1
            full_name: ""
          - name: shell-support
            result: shell-support
            timeout_minutes: 15
            paths: tests/BuilderWorktree.Tests.ps1;tests/codex-subagent-worktree-guard.Tests.ps1;tests/OrchestraPreflight.Tests.ps1;tests/PaneBorder.Tests.ps1;tests/V03618ReleaseHardening.Tests.ps1
            full_name: ""
    steps:
      - uses: actions/checkout@v6

      - name: Install Pester
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $existing = Get-Module -ListAvailable Pester |
            Where-Object { $_.Version -ge [version]'5.0.0' } |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if (-not $existing) {
            $repo = Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue
            if (-not $repo) {
              Register-PSRepository -Default -ErrorAction Stop
            }
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction Stop
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              try {
                Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0 -Repository PSGallery -ErrorAction Stop
                break
              } catch {
                if ($attempt -eq 3) { throw }
                Start-Sleep -Seconds (5 * $attempt)
              }
            }
          }
          Import-Module Pester -MinimumVersion 5.0 -Force
          Get-Module Pester | Format-Table Name,Version,Path -AutoSize

      - name: Run Pester (${{ matrix.name }})
        shell: pwsh
        run: |
          $requestedPaths = @('${{ matrix.paths }}' -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          $resolvedPaths = @()
          foreach ($requested in $requestedPaths) {
            $matches = @(Resolve-Path -Path $requested -ErrorAction Stop)
            foreach ($match in $matches) {
              $resolvedPaths += $match.ProviderPath
            }
          }
          $resolvedPaths = @($resolvedPaths | Sort-Object -Unique)
          if ($resolvedPaths.Count -eq 0) {
            throw "No Pester test files matched for category '${{ matrix.name }}'."
          }
          $fullNameFilters = @('${{ matrix.full_name }}' -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ })

          Write-Host "::group::Pester category ${{ matrix.name }} targets"
          foreach ($path in $resolvedPaths) {
            $item = Get-Item -LiteralPath $path
            $relative = Resolve-Path -LiteralPath $path -Relative
            Write-Host ("{0} ({1:n0} bytes)" -f $relative, $item.Length)
          }
          if ($fullNameFilters.Count -gt 0) {
            Write-Host "FullName filters:"
            foreach ($filter in $fullNameFilters) {
              Write-Host ("- {0}" -f $filter)
            }
          }
          Write-Host "::endgroup::"

          $config = New-PesterConfiguration
          $config.Run.Path = $resolvedPaths
          $config.Run.Exit = $true
          if ($fullNameFilters.Count -gt 0) {
            $config.Filter.FullName = $fullNameFilters
          }
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'test-results-${{ matrix.result }}.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.result }}
          path: test-results-${{ matrix.result }}.xml

  core-build-test:
    name: Core Build and Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build core
        run: cargo build --release --manifest-path core/Cargo.toml

      - name: Test core
        run: cargo test --manifest-path core/Cargo.toml

  desktop-build-test:
    name: Desktop Build and Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: winsmux-app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: winsmux-app
        run: npm ci

      - name: Build frontend
        working-directory: winsmux-app
        run: npm run build

      - name: Test Tauri backend
        run: cargo test --manifest-path winsmux-app/src-tauri/Cargo.toml

      - name: Build desktop binary without bundling
        working-directory: winsmux-app
        run: npm run tauri -- build --no-bundle

  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - public-surface
      - pester
      - core-build-test
      - desktop-build-test
    if: always()
    steps:
      - name: Require all checks
        shell: bash
        run: |
          set -euo pipefail
          for result in \
            "${{ needs.secret-scan.result }}" \
            "${{ needs.public-surface.result }}" \
            "${{ needs.pester.result }}" \
            "${{ needs.core-build-test.result }}" \
            "${{ needs.desktop-build-test.result }}"; do
            if [ "$result" != "success" ]; then
              echo "Merge gate failed because a required job result was '$result'."
              exit 1
            fi
          done
          echo "Merge gate passed."
