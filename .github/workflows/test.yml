name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Gitleaks Incremental Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.0"
          curl -fsSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run secret scan since recorded baseline
        shell: pwsh
        run: pwsh -NoProfile -File scripts/gitleaks-history.ps1

  public-surface:
    name: Public Surface Audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Bootstrap repo hooks
        shell: pwsh
        run: pwsh -NoProfile -File scripts/bootstrap-git-guard.ps1

      - name: Assert hooks path
        shell: pwsh
        run: |
          $hooksPath = (git config --get core.hooksPath).Trim()
          if ($hooksPath -notmatch '(^|[\\/])\.githooks$') {
            throw "core.hooksPath must point to .githooks, got '$hooksPath'"
          }

      - name: Run git-guard
        shell: pwsh
        run: pwsh -NoProfile -File scripts/git-guard.ps1 -Mode full

      - name: Run public surface audit
        shell: pwsh
        run: pwsh -NoProfile -File scripts/audit-public-surface.ps1

  pester:
    name: Pester Tests
    runs-on: windows-latest
    needs: public-surface
    steps:
      - uses: actions/checkout@v6

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0

      - name: Run Pester
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'test-results.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results.xml

  core-build-test:
    name: Core Build and Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build core
        run: cargo build --release --manifest-path core/Cargo.toml

      - name: Test core
        run: cargo test --manifest-path core/Cargo.toml

  desktop-build-test:
    name: Desktop Build and Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: winsmux-app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: winsmux-app
        run: npm ci

      - name: Build frontend
        working-directory: winsmux-app
        run: npm run build

      - name: Test Tauri backend
        run: cargo test --manifest-path winsmux-app/src-tauri/Cargo.toml

      - name: Build desktop binary without bundling
        working-directory: winsmux-app
        run: npm run tauri -- build --no-bundle

  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - public-surface
      - pester
      - core-build-test
      - desktop-build-test
    if: always()
    steps:
      - name: Require all checks
        shell: bash
        run: |
          set -euo pipefail
          for result in \
            "${{ needs.secret-scan.result }}" \
            "${{ needs.public-surface.result }}" \
            "${{ needs.pester.result }}" \
            "${{ needs.core-build-test.result }}" \
            "${{ needs.desktop-build-test.result }}"; do
            if [ "$result" != "success" ]; then
              echo "Merge gate failed because a required job result was '$result'."
              exit 1
            fi
          done
          echo "Merge gate passed."
