name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Gitleaks Incremental Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.0"
          curl -fsSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run secret scan since recorded baseline
        shell: pwsh
        run: pwsh -NoProfile -File scripts/gitleaks-history.ps1

  public-surface:
    name: Public Surface Audit
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Bootstrap repo hooks
        shell: pwsh
        run: pwsh -NoProfile -File scripts/bootstrap-git-guard.ps1

      - name: Assert hooks path
        shell: pwsh
        run: |
          $hooksPath = (git config --get core.hooksPath).Trim()
          if ($hooksPath -notmatch '(^|[\\/])\.githooks$') {
            throw "core.hooksPath must point to .githooks, got '$hooksPath'"
          }

      - name: Run git-guard
        shell: pwsh
        run: pwsh -NoProfile -File scripts/git-guard.ps1 -Mode full

      - name: Run public surface audit
        shell: pwsh
        run: pwsh -NoProfile -File scripts/audit-public-surface.ps1

  install-e2e:
    name: Fresh Install E2E (${{ matrix.route }})
    runs-on: windows-2025
    needs: public-surface
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        route: [Npm, Direct, DefectDetection]
    steps:
      - uses: actions/checkout@v6

      - name: Verify installer download targets
        shell: pwsh
        run: pwsh -NoProfile -File scripts/assert-install-downloads-exist.ps1 -RepositoryRoot . -Treeish HEAD

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run fresh install route
        shell: pwsh
        env:
          WINSMUX_INSTALL_E2E_RELEASE_TAG: v0.36.28
          WINSMUX_INSTALL_E2E_GITHUB_ACCESS: ${{ github.token }}
        run: pwsh -NoProfile -File scripts/test-install-e2e.ps1 -Route "${{ matrix.route }}" -RepositoryRoot . -SourceCommit "${{ github.sha }}"

  native-lifecycle-source:
    name: Native Lifecycle Source Boundary
    runs-on: windows-2025
    needs: public-surface
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build candidate native binary
        run: cargo build --release --manifest-path core/Cargo.toml --bin winsmux

      - name: Reject hostile working-directory bridge selection
        shell: pwsh
        run: pwsh -NoProfile -File scripts/test-native-bridge-resolution.ps1 -CandidateBinary target/release/winsmux.exe

  common-contract-drift:
    name: Common Contract Drift Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: winsmux-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: winsmux-app
        run: npm ci

      - name: Check common contract package drift
        working-directory: winsmux-app
        run: npm run test:common-contract-package

      - name: Check automation driver pool
        working-directory: winsmux-app
        run: npm run test:automation-driver-pool

  pester:
    name: Pester Tests (${{ matrix.name }})
    runs-on: windows-latest
    needs: public-surface
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bridge-foundation
            result: bridge-foundation
            timeout_minutes: 15
            paths: tests/bridge/Foundation.Tests.ps1;tests/bridge/Foundation.Settings.Tests.ps1
            full_name: ""
          - name: bridge-agent-orchestra
            result: bridge-agent-orchestra
            timeout_minutes: 20
            paths: tests/bridge/AgentOrchestra.Tests.ps1;tests/bridge/AgentOrchestra.Bootstrap.Tests.ps1
            full_name: ""
          - name: bridge-command-status
            result: bridge-command-status
            timeout_minutes: 12
            paths: tests/bridge/CommandStatus.Tests.ps1;tests/bridge/CommandStatus.RuntimeIdentity.Tests.ps1
            full_name: ""
          - name: bridge-worker-workspace-sandbox
            result: bridge-worker-workspace-sandbox
            timeout_minutes: 12
            paths: tests/bridge/WorkerWorkspaceSandbox.Tests.ps1
            full_name: ""
          - name: bridge-worker-broker-token
            result: bridge-worker-broker-token
            timeout_minutes: 12
            paths: tests/bridge/WorkerBrokerToken.Tests.ps1
            full_name: ""
          - name: bridge-worker-policy
            result: bridge-worker-policy
            timeout_minutes: 12
            paths: tests/bridge/WorkerPolicy.Tests.ps1
            full_name: ""
          - name: bridge-worker-secrets-status
            result: bridge-worker-secrets-status
            timeout_minutes: 12
            paths: tests/bridge/WorkerSecretsStatus.Tests.ps1
            full_name: ""
          - name: bridge-worker-heartbeat-start
            result: bridge-worker-heartbeat-start
            timeout_minutes: 12
            paths: tests/bridge/WorkerHeartbeatStart.Tests.ps1
            full_name: ""
          - name: bridge-worker-api-agy-exec
            result: bridge-worker-api-agy-exec
            timeout_minutes: 12
            paths: tests/bridge/WorkerApiAgyExec.Tests.ps1
            full_name: ""
          - name: bridge-command-queue-reporting
            result: bridge-command-queue-reporting
            timeout_minutes: 12
            paths: tests/bridge/CommandQueueReporting.Tests.ps1
            full_name: ""
          - name: bridge-command-review-dispatch
            result: bridge-command-review-dispatch
            timeout_minutes: 12
            paths: tests/bridge/CommandReviewDispatch.Tests.ps1
            full_name: ""
          - name: bridge-provider-commands
            result: bridge-provider-commands
            timeout_minutes: 15
            paths: tests/bridge/ProviderCommands.Tests.ps1;tests/bridge/ProviderCommands.Dispatch.Tests.ps1
            full_name: ""
          - name: bridge-artifacts-runtime
            result: bridge-artifacts-runtime
            timeout_minutes: 15
            paths: tests/bridge/ArtifactsRuntime.Tests.ps1;tests/bridge/ArtifactsRuntime.Operator.Tests.ps1
            full_name: ""
          - name: integration
            result: integration
            timeout_minutes: 25
            paths: tests/Integration.GateEnforcement.Tests.ps1;tests/Integration.MultiAgent.Tests.ps1;tests/Integration.PaneMonitorHook.Tests.ps1;tests/Integration.PluginHookLoader.Tests.ps1;tests/Integration.WorktreeHook.Tests.ps1
            full_name: ""
          - name: worker-benchmark
            result: worker-benchmark
            timeout_minutes: 20
            paths: tests/CliBakeoff.Tests.ps1;tests/HarnessContract.Tests.ps1;tests/Runtime.VaultInject.Tests.ps1
            full_name: ""
          - name: release-public
            result: release-public
            timeout_minutes: 20
            paths: tests/PublicSurfacePolicy.Tests.ps1;tests/VersionSurface.Tests.ps1;tests/NpmReleasePackage.Tests.ps1;tests/GitHubWritePreflight.Tests.ps1;tests/McpServerContract.Tests.ps1;tests/ThreatModelContract.Tests.ps1;tests/EnterpriseStrategyAlignment.Tests.ps1;tests/ReviewLatencyHardening.Tests.ps1;tests/UpstreamReevaluation.Tests.ps1
            full_name: ""
          - name: shell-support
            result: shell-support
            timeout_minutes: 15
            paths: tests/BuilderWorktree.Tests.ps1;tests/codex-subagent-worktree-guard.Tests.ps1;tests/OrchestraPreflight.Tests.ps1;tests/PaneBorder.Tests.ps1;tests/V03618ReleaseHardening.Tests.ps1;tests/AgentReadiness.Tests.ps1
            full_name: ""
          - name: repo-audit-v03619
            result: repo-audit-v03619
            timeout_minutes: 12
            paths: tests/V03619RepoAudit.Tests.ps1
            full_name: ""
          - name: coordinator-v03620
            result: coordinator-v03620
            timeout_minutes: 12
            paths: tests/V03620CoordinatorFoundation.Tests.ps1
            full_name: ""
          - name: local-router-v03621
            result: local-router-v03621
            timeout_minutes: 12
            paths: tests/V03621LocalRouterShadow.Tests.ps1
            full_name: ""
          - name: desktop-split-v03626
            result: desktop-split-v03626
            timeout_minutes: 12
            paths: tests/V03626DesktopSplitGate.Tests.ps1
            full_name: ""
          - name: compat-performance-v03627
            result: compat-performance-v03627
            timeout_minutes: 12
            paths: tests/V03627CompatPerformanceGate.Tests.ps1
            full_name: ""
          - name: race-abnormal-soak-v03628
            result: race-abnormal-soak-v03628
            timeout_minutes: 12
            paths: tests/V03628RaceAbnormalSoak.Tests.ps1
            full_name: ""
          - name: runtime-reliability-v03628
            result: runtime-reliability-v03628
            timeout_minutes: 12
            paths: tests/V03628RuntimeReliabilityGate.Tests.ps1
            full_name: ""
          - name: packaged-restore-v03628
            result: packaged-restore-v03628
            timeout_minutes: 12
            paths: tests/V03628PackagedRestoreGate.Tests.ps1
            full_name: ""
    steps:
      - uses: actions/checkout@v6

      - name: Install Pester
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $existing = Get-Module -ListAvailable Pester |
            Where-Object { $_.Version -ge [version]'5.0.0' } |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if (-not $existing) {
            $repo = Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue
            if (-not $repo) {
              Register-PSRepository -Default -ErrorAction Stop
            }
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction Stop
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              try {
                Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0 -Repository PSGallery -ErrorAction Stop
                break
              } catch {
                if ($attempt -eq 3) { throw }
                Start-Sleep -Seconds (5 * $attempt)
              }
            }
          }
          Import-Module Pester -MinimumVersion 5.0 -Force
          Get-Module Pester | Format-Table Name,Version,Path -AutoSize

      - name: Run Pester (${{ matrix.name }})
        shell: pwsh
        run: |
          $categoryName = '${{ matrix.name }}'
          if ($categoryName -like 'bridge-*') {
            pwsh -NoProfile -File scripts/assert-pester-shard-coverage.ps1 | Write-Host
            if ($LASTEXITCODE -ne 0) {
              throw "Bridge shard coverage gate failed."
            }
          }
          $requestedPaths = @('${{ matrix.paths }}' -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          $resolvedPaths = @()
          foreach ($requested in $requestedPaths) {
            $matches = @(Resolve-Path -Path $requested -ErrorAction Stop)
            foreach ($match in $matches) {
              $resolvedPaths += $match.ProviderPath
            }
          }
          $resolvedPaths = @($resolvedPaths | Sort-Object -Unique)
          if ($resolvedPaths.Count -eq 0) {
            throw "No Pester test files matched for category '${{ matrix.name }}'."
          }
          Write-Host "::group::Pester category ${{ matrix.name }} targets"
          foreach ($path in $resolvedPaths) {
            $item = Get-Item -LiteralPath $path
            $relative = Resolve-Path -LiteralPath $path -Relative
            Write-Host ("{0} ({1:n0} bytes)" -f $relative, $item.Length)
          }
          Write-Host "::endgroup::"

          $config = New-PesterConfiguration
          $config.Run.Path = $resolvedPaths
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'test-results-${{ matrix.result }}.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.result }}
          path: test-results-${{ matrix.result }}.xml

  core-build-test:
    name: Core Build and Test
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build core
        run: cargo build --release --manifest-path core/Cargo.toml

      - name: Test core
        run: cargo test --manifest-path core/Cargo.toml

  desktop-build-test:
    name: Desktop Build and Test
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: winsmux-app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: winsmux-app
        run: npm ci

      - name: Build frontend
        working-directory: winsmux-app
        run: npm run build

      - name: Test Tauri backend
        run: cargo test --manifest-path winsmux-app/src-tauri/Cargo.toml

      - name: Build desktop binary without bundling
        working-directory: winsmux-app
        run: npm run tauri -- build --no-bundle

  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - secret-scan
      - public-surface
      - install-e2e
      - native-lifecycle-source
      - common-contract-drift
      - pester
      - core-build-test
      - desktop-build-test
    if: always()
    steps:
      - name: Require all checks
        shell: bash
        run: |
          set -euo pipefail
          for result in \
            "${{ needs.secret-scan.result }}" \
            "${{ needs.public-surface.result }}" \
            "${{ needs.install-e2e.result }}" \
            "${{ needs.native-lifecycle-source.result }}" \
            "${{ needs.common-contract-drift.result }}" \
            "${{ needs.pester.result }}" \
            "${{ needs.core-build-test.result }}" \
            "${{ needs.desktop-build-test.result }}"; do
            if [ "$result" != "success" ]; then
              echo "Merge gate failed because a required job result was '$result'."
              exit 1
            fi
          done
          echo "Merge gate passed."
