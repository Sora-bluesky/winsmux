name: Release Core Binary
on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            artifact: winsmux-windows-x64
          - target: aarch64-pc-windows-msvc
            artifact: winsmux-windows-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --manifest-path core/Cargo.toml --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: core/target/${{ matrix.target }}/release/winsmux.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
      - name: Create Release Assets
        run: |
          mkdir -p release
          cp winsmux-windows-x64/winsmux.exe release/winsmux-x64.exe
          cp winsmux-windows-arm64/winsmux.exe release/winsmux-arm64.exe
          cd release && sha256sum *.exe > SHA256SUMS
      - name: Generate Release Body
        shell: pwsh
        run: ./scripts/generate-release-notes.ps1 -Version "${{ github.ref_name }}" -OutputPath "release/release-body.md"
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release/release-body.md
          files: release/*
