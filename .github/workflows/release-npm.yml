name: Release npm Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Override semver version for the staged npm package"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 15
    outputs:
      publish_ready: ${{ steps.stage.outputs.publish_ready }}
      version: ${{ steps.stage.outputs.version }}
      release_tag: ${{ steps.stage.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install frontend dependencies
        working-directory: winsmux-app
        run: npm ci

      - name: Check common contract package drift
        working-directory: winsmux-app
        run: npm run test:common-contract-package

      - name: Stage npm package
        id: stage
        shell: pwsh
        run: |
          $requestedVersion = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($requestedVersion)) {
            $releaseTag = '${{ github.ref_name }}'
            $stageArguments = @('--release-tag', $releaseTag)
          } else {
            $releaseTag = ''
            $stageArguments = @('--version', $requestedVersion)
          }

          node scripts/stage-npm-release.mjs @stageArguments --out output/npm-release/winsmux

          if (Test-Path "output/npm-release/winsmux/package.json") {
            $packageJson = Get-Content -LiteralPath "output/npm-release/winsmux/package.json" -Raw | ConvertFrom-Json
            $version = [string]$packageJson.version
            if ($packageJson.version -eq "0.0.0-development") {
              throw "Staged npm package still has the development placeholder version."
            }
            if ([string]::IsNullOrWhiteSpace($version)) {
              throw "Staged npm package did not contain a version."
            }
            "publish_ready=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "release_tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "publish_ready=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Skip Windows verify
        if: steps.stage.outputs.publish_ready != 'true'
        run: echo "winsmux npm package is not publish-ready yet; skipping Windows verify."

      - name: Verify Windows entrypoint
        if: steps.stage.outputs.publish_ready == 'true'
        run: node output/npm-release/winsmux/index.mjs help

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: needs.verify.outputs.publish_ready == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Stage npm package
        id: stage
        shell: pwsh
        run: |
          $version = "${{ needs.verify.outputs.version }}"
          $releaseTag = "${{ needs.verify.outputs.release_tag }}"

          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            $stageArguments = @('--version', $version)
          } else {
            $stageArguments = @('--release-tag', $releaseTag)
          }
          node scripts/stage-npm-release.mjs @stageArguments --out output/npm-release/winsmux
          $packageJson = Get-Content -LiteralPath "output/npm-release/winsmux/package.json" -Raw | ConvertFrom-Json
          if ($packageJson.version -eq "0.0.0-development") {
            throw "Staged npm package still has the development placeholder version."
          }
          if ($packageJson.version -ne $version) {
            throw "Staged npm package version '$($packageJson.version)' does not match requested version '$version'."
          }

      - name: Check whether npm version already exists
        id: npm-version
        run: |
          if npm view "winsmux@${{ needs.verify.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip existing npm version
        if: steps.npm-version.outputs.exists == 'true'
        run: echo "winsmux@${{ needs.verify.outputs.version }} is already published; skipping npm publish."

      - name: Verify staged package
        if: steps.npm-version.outputs.exists != 'true'
        working-directory: output/npm-release/winsmux
        run: |
          node --version
          npm pack --dry-run

      - name: Publish to npm
        if: steps.npm-version.outputs.exists != 'true'
        working-directory: output/npm-release/winsmux
        run: npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
