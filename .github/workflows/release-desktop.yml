name: Release Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to upload to; leave blank for artifact-only verification'
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: winsmux-app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: winsmux-app
        run: npm ci

      - name: Require desktop release signing secrets
        if: github.event_name == 'push' || inputs.release_tag != ''
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $requiredSecrets = @(
            'WINDOWS_SIGNING_CERTIFICATE_BASE64',
            'WINDOWS_SIGNING_CERTIFICATE_PASSWORD',
            'TAURI_SIGNING_PRIVATE_KEY',
            'TAURI_SIGNING_PRIVATE_KEY_PASSWORD'
          )
          foreach ($name in $requiredSecrets) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Missing required desktop release signing secret: $name"
            }
          }

      - name: Prepare Windows signing certificate
        if: github.event_name == 'push' || inputs.release_tag != ''
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "winsmux-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERTIFICATE_BASE64))
          "WINSMUX_WINDOWS_SIGNING_CERTIFICATE_PATH=$certPath" | Add-Content -LiteralPath $env:GITHUB_ENV -Encoding utf8
          # Trust the release signing certificate on this ephemeral runner so
          # the "Verify desktop installer signatures" step can validate the
          # chain to a trusted root. Required while the release is signed with
          # a self-signed certificate (#1140); harmless for a CA-issued
          # certificate. The verification step still rejects unsigned or
          # tampered assets because the Authenticode check covers integrity,
          # not only trust.
          $pfxPassword = ConvertTo-SecureString $env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD -AsPlainText -Force
          $imported = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\LocalMachine\My -Password $pfxPassword
          $publicCertPath = Join-Path $env:RUNNER_TEMP "winsmux-signing.cer"
          Export-Certificate -Cert $imported -FilePath $publicCertPath | Out-Null
          Import-Certificate -FilePath $publicCertPath -CertStoreLocation Cert:\LocalMachine\Root | Out-Null
          $signtool = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
            Select-Object -First 1 -ExpandProperty FullName
          if ([string]::IsNullOrWhiteSpace($signtool)) {
            throw "signtool.exe was not found on the GitHub Actions runner"
          }
          "WINSMUX_SIGNTOOL_EXE=$signtool" | Add-Content -LiteralPath $env:GITHUB_ENV -Encoding utf8

      - name: Build desktop bundles
        working-directory: winsmux-app
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $isReleaseUpload = '${{ github.event_name }}' -eq 'push' -or '${{ inputs.release_tag }}' -ne ''
          if ($isReleaseUpload) {
            npm run tauri -- build --config src-tauri/tauri.ci.conf.json
          } else {
            npm run tauri -- build
          }

      - name: Create desktop updater latest.json
        if: github.event_name == 'push' || inputs.release_tag != ''
        shell: pwsh
        run: |
          $tagName = if ('${{ github.event_name }}' -eq 'push') { '${{ github.ref_name }}' } else { '${{ inputs.release_tag }}' }
          if ([string]::IsNullOrWhiteSpace($tagName)) {
            throw "A release tag is required to generate latest.json"
          }
          $version = (Get-Content -LiteralPath VERSION -Raw).Trim()
          $setup = Get-ChildItem -LiteralPath target/release/bundle/nsis -Filter "winsmux_${version}_x64-setup.exe" -File | Select-Object -First 1
          if ($null -eq $setup) {
            throw "Unable to locate signed NSIS setup executable for latest.json"
          }
          $sigPath = "$($setup.FullName).sig"
          if (-not (Test-Path -LiteralPath $sigPath -PathType Leaf)) {
            throw "Unable to locate updater signature next to $($setup.Name)"
          }
          $signature = (Get-Content -LiteralPath $sigPath -Raw -Encoding UTF8).Trim()
          if ([string]::IsNullOrWhiteSpace($signature)) {
            throw "Updater signature for $($setup.Name) is empty"
          }
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$tagName/$($setup.Name)"
          $latest = [ordered]@{
            version = $version
            notes = "See $tagName release notes."
            pub_date = (Get-Date).ToUniversalTime().ToString('o')
            platforms = [ordered]@{
              'windows-x86_64' = [ordered]@{
                signature = $signature
                url = $downloadUrl
              }
            }
          }
          $latest | ConvertTo-Json -Depth 6 | Set-Content -LiteralPath target/release/bundle/latest.json -Encoding UTF8

      - name: Collect desktop release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output/desktop-release | Out-Null
          Copy-Item target/release/bundle/msi/*.msi output/desktop-release/
          Copy-Item target/release/bundle/nsis/*.exe output/desktop-release/
          Copy-Item target/release/bundle/nsis/*.sig output/desktop-release/ -ErrorAction SilentlyContinue
          Copy-Item target/release/bundle/latest.json output/desktop-release/ -ErrorAction SilentlyContinue
          $isReleaseUpload = '${{ github.event_name }}' -eq 'push' -or '${{ inputs.release_tag }}' -ne ''
          $version = (Get-Content -LiteralPath VERSION -Raw).Trim()
          $requiredAssets = @(
            "winsmux_${version}_x64-setup.exe",
            "winsmux_${version}_x64_en-US.msi"
          )
          if ($isReleaseUpload) {
            $requiredAssets += "latest.json"
          }
          foreach ($assetName in $requiredAssets) {
            $assetPath = Join-Path "output/desktop-release" $assetName
            if (-not (Test-Path -LiteralPath $assetPath -PathType Leaf)) {
              $actualAssets = @(Get-ChildItem -LiteralPath output/desktop-release -File | Select-Object -ExpandProperty Name)
              throw "Required desktop release asset '$assetName' was not collected. Actual assets: $($actualAssets -join ', ')"
            }
          }
          $signatureAssets = @(Get-ChildItem -LiteralPath output/desktop-release -Filter *.sig -File)
          if ($isReleaseUpload -and $signatureAssets.Count -eq 0) {
            throw "Required signed updater metadata was not collected. Expected at least one .sig file next to the desktop release assets."
          }
          Push-Location output/desktop-release
          Get-ChildItem -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 -Path $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            } | Set-Content -Encoding ascii SHA256SUMS-desktop
          Pop-Location

      - name: Verify desktop installer signatures
        if: github.event_name == 'push' || inputs.release_tag != ''
        shell: pwsh
        run: |
          $assets = Get-ChildItem -LiteralPath output/desktop-release -File |
            Where-Object { $_.Extension -in @('.exe', '.msi') }
          foreach ($asset in $assets) {
            $signature = Get-AuthenticodeSignature -LiteralPath $asset.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Desktop release asset '$($asset.Name)' is not Authenticode signed with a valid signature. Status: $($signature.Status)"
            }
          }

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: winsmux-desktop-bundles
          path: output/desktop-release/*

      - name: Upload desktop bundles to release
        if: github.event_name == 'push' || inputs.release_tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
          files: output/desktop-release/*
