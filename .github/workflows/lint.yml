name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  psscriptanalyzer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -IncludeRule * -Severity Error,Warning
          if ($results) {
            $results | Format-Table -AutoSize | Out-String | Write-Host
            throw "PSScriptAnalyzer reported $($results.Count) issue(s)."
          }
