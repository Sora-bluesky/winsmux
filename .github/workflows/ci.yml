name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ps-syntax:
    name: PowerShell Syntax Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse PowerShell files
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Recurse -Filter *.ps1 -File | Sort-Object FullName
          if ($files.Count -eq 0) {
            Write-Host 'No .ps1 files found.'
            exit 0
          }

          $hasErrors = $false

          foreach ($file in $files) {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$tokens,
              [ref]$parseErrors
            ) | Out-Null

            if ($parseErrors.Count -gt 0) {
              $hasErrors = $true
              Write-Host "Syntax errors in $($file.FullName):"
              foreach ($parseError in $parseErrors) {
                Write-Host "  Line $($parseError.Extent.StartLineNumber), Column $($parseError.Extent.StartColumnNumber): $($parseError.Message)"
              }
            }
          }

          if ($hasErrors) {
            Write-Error 'PowerShell syntax check failed.'
            exit 1
          }

  conflict-markers:
    name: Conflict Markers Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect conflict markers
        shell: pwsh
        run: |
          git grep -rn '<<<<<<<'
          if ($LASTEXITCODE -eq 0) {
            Write-Error 'Conflict markers found.'
            exit 1
          }
          if ($LASTEXITCODE -ne 1) {
            exit $LASTEXITCODE
          }

  psmux-bridge-smoke:
    name: psmux-bridge Smoke Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run version command
        shell: pwsh
        run: pwsh ./scripts/psmux-bridge.ps1 version
